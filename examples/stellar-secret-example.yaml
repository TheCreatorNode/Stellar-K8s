apiVersion: stellar.org/v1alpha1
kind: StellarSecret
metadata:
  name: postgres-dynamic
  namespace: stellar
spec:
  secretName: postgres-creds
  backend: vault
  provider: Vault
  dynamic:
    enabled: true
    ttl: 1h
    database:
      host: postgres.stellar.svc
      database: horizon
      username: horizon
      role: readwrite
  rotation:
    interval: 720h
    zeroDowntime: true
    versionRetention: 5
  targets:
    - kind: envVar
      name: horizon
      key: DATABASE_URL
  audit:
    enabled: true
    sink: s3://audit-logs/secrets
